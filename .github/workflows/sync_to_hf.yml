name: Sync to Hugging Face space
on:
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git push --force https://tramdk:$HF_TOKEN@huggingface.co/spaces/tramdk/autoreels main
