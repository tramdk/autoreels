<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-top: {{ LOGO_TOP }}; --v-logo-left: {{ LOGO_LEFT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-show: {{ SHOW_LOGO }}; --v-tag-top: {{ TAG_TOP }}; --v-tag-left: {{ TAG_LEFT }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-show: {{ SHOW_TAG }}; --v-show-datetime: {{ SHOW_DATETIME }}; --v-main-top: {{ MAIN_TOP }}; --v-main-left: {{ MAIN_LEFT }}; --v-content-gap: {{ CONTENT_GAP }}; --v-card-bg-color: {{ CARD_BG_COLOR }}; --v-card-border-top: {{ CARD_BORDER_TOP }}; --v-card-border-bottom: {{ CARD_BORDER_BOTTOM }}; --v-card-border-left: {{ CARD_BORDER_LEFT }}; --v-card-border-right: {{ CARD_BORDER_RIGHT }}; --v-card-border-color: {{ CARD_BORDER_COLOR }}; --v-card-border-radius: {{ CARD_BORDER_RADIUS }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }};">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, user-scalable=no">
  <title>AutoReels Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: calc(var(--v-width) * 1px);
      height: calc(var(--v-height) * 1px);
      overflow: hidden;
      background-color: #0F172A;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #0F172A;
      color: white;
      overflow: hidden;
    }

    /* Background */
    .bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.6) 50%, rgba(15, 23, 42, 0.85) 100%);
      z-index: 1;
    }

    /* Positioning Utility */
    .pos-el {
      position: absolute;
      z-index: 100;
    }

    /* Brand */
    #brand-header {
      top: calc(var(--v-logo-top) * 1px);
      left: 50%;
      display: var(--v-logo-show);
    }

    #brand-logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: calc(var(--v-logo-size) * 1px);
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--v-logo-color);
      text-shadow: 0 0 30px var(--v-logo-color);
      white-space: nowrap;
      transform: translateX(-50%) translateX(calc(var(--v-logo-left) * 1px));
    }

    /* Bottom info / Tag */
    #bottom-info {
      top: calc(var(--v-tag-top) * 1px);
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateX(-50%) translateX(calc(var(--v-tag-left) * 1px));
    }

    #tag-badge {
      padding: 12px 30px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: calc(var(--v-tag-size) * 1px);
      text-transform: uppercase;
      background-color: var(--v-tag-bg);
      color: var(--v-tag-color);
      border-radius: 8px;
      letter-spacing: 1px;
      display: var(--v-tag-show);
      white-space: nowrap;
    }

    #datetime {
      font-size: 26px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 700;
      letter-spacing: 2px;
      margin-top: 15px;
      display: var(--v-show-datetime);
    }

    /* Scene cards */
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
    }

    .scene-card {
      position: absolute;
      top: calc(var(--v-main-top) * 1px);
      left: 0;
      width: 100%;
      padding: 60px calc(var(--v-main-left) * 1px);
      display: none;
      flex-direction: column;
      gap: calc(var(--v-content-gap) * 1px);
      opacity: 0;
      background-color: var(--v-card-bg-color);
      border-top: calc(var(--v-card-border-top) * 1px) solid var(--v-card-border-color);
      border-bottom: calc(var(--v-card-border-bottom) * 1px) solid var(--v-card-border-color);
      border-left: calc(var(--v-card-border-left) * 1px) solid var(--v-card-border-color);
      border-right: calc(var(--v-card-border-right) * 1px) solid var(--v-card-border-color);
      border-radius: calc(var(--v-card-border-radius) * 1px);
    }

    /* Scene text styles */
    .scene-card.type-hook .scene-label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--v-divider-color);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .scene-card.type-hook .scene-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: calc(var(--v-hook-size) * 1px);
      line-height: 1.1;
      text-transform: uppercase;
      color: var(--v-hook-color);
      text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
    }

    .scene-card.type-hook .scene-accent {
      width: 120px;
      height: 6px;
      border-radius: 4px;
      background: var(--v-divider-color);
      margin-top: 20px;
    }

    .scene-card.type-body .scene-text {
      font-size: calc(var(--v-body-size) * 1px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--v-body-color);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .scene-card.type-body .scene-bar {
      width: 60px;
      height: 5px;
      border-radius: 3px;
      background: var(--v-divider-color);
      margin-bottom: 15px;
    }

    .scene-card.type-outro .scene-cta-label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 32px;
      letter-spacing: 6px;
      color: var(--v-tag-bg);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .scene-card.type-outro .scene-text {
      font-size: calc(var(--v-body-size) * 1px);
      font-weight: 700;
      line-height: 1.35;
      color: var(--v-body-color);
    }

    .main-align-center {
      align-items: center;
      text-align: center;
    }

    .main-align-right {
      align-items: flex-end;
      text-align: right;
    }

    .main-align-left {
      align-items: flex-start;
      text-align: left;
    }



    #preloader {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
      opacity: 0;
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="main" data-width="{{ WIDTH }}" data-height="{{ HEIGHT }}" data-start="0"
    data-duration="{{ DURATION }}">
    <div id="preloader"></div>
    <div id="bg-layers">
      <img id="bg-1" class="bg-layer" src="{{BG_IMAGE_URL}}" style="opacity: {{BG_BRIGHTNESS}};" alt="">
      <img id="bg-2" class="bg-layer" style="opacity: 0;" alt="">
    </div>
    <div id="bg-overlay"></div>

    <div id="brand-header" class="pos-el">
      <h1 id="brand-logo">{{LOGO_TEXT}}</h1>
    </div>


    <div id="scene-container"></div>

    <div id="bottom-info" class="pos-el">
      <div id="tag-badge">{{TAG_TEXT}}</div>
      <div id="datetime">{{DATETIME}}</div>
    </div>
  </div>

  <script>
    var SCENES_DATA = JSON.parse('{{ SCENES_JSON }}');
    var SCENE_DURATIONS = JSON.parse('{{ SCENE_DURATIONS_JSON }}');
    var TOTAL_DURATION = parseFloat("{{ DURATION }}") || 15;
    var MAIN_ALIGN = '{{MAIN_ALIGN}}';
    var DEFAULT_BG = '{{BG_IMAGE_URL}}';
    var BG_BRIGHTNESS = parseFloat("{{ BG_BRIGHTNESS }}") || 0.45;
    var SHOW_CARD = '{{SHOW_CARD}}';

    // Preload images to avoid flickering during scene transitions
    (function preloadImages() {
      var urls = [DEFAULT_BG];
      SCENES_DATA.forEach(function (s) { if (s.imageUrl) urls.push(s.imageUrl); });
      var uniqueUrls = Array.from(new Set(urls.filter(Boolean)));
      var preloader = document.getElementById('preloader');
      uniqueUrls.forEach(function (url) {
        var img = new Image();
        img.src = url;
        preloader.appendChild(img);
      });
    })();

    window.__hf = { duration: TOTAL_DURATION, seek: function (t) { if (window._tl) window._tl.pause().seek(t); } };
  </script>

  <script>
    try {
      var scenes = SCENES_DATA;
      var n = scenes.length;
      var container = document.getElementById('scene-container');
      var hasDurations = SCENE_DURATIONS && SCENE_DURATIONS.length === n;

      window._tl = gsap.timeline({ paused: true });
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = window._tl;

      window._tl.from('#brand-header', { y: -40, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0);
      window._tl.from('#bottom-info', { y: 40, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.1);

      var currentBgIndex = 1;
      var currentTime = 0;
      // Text appears slightly before voice for natural feel
      var TEXT_LEAD = 0.3;

      for (var i = 0; i < n; i++) {
        var s = scenes[i];
        var duration = hasDurations ? SCENE_DURATIONS[i] : TOTAL_DURATION / n;
        var sceneStart = Math.max(0, currentTime - (i > 0 ? TEXT_LEAD : 0));

        var card = document.createElement('div');
        card.className = 'scene-card type-' + s.type;

        if (MAIN_ALIGN.indexOf('center') !== -1) card.classList.add('main-align-center');
        else if (MAIN_ALIGN.indexOf('right') !== -1) card.classList.add('main-align-right');
        else card.classList.add('main-align-left');

        var safeText = s.voiceText || '';
        if (s.type === 'hook') {
          card.innerHTML = '<div class="scene-label">BREAKING NEWS</div><div class="scene-text">' + safeText + '</div><div class="scene-accent"></div>';
        } else if (s.type === 'outro') {
          card.innerHTML = '<div class="scene-cta-label">JOIN THE COMMUNITY</div><div class="scene-text">' + safeText + '</div>';
        } else {
          card.innerHTML = '<div class="scene-bar"></div><div class="scene-text">' + safeText + '</div>';
        }

        container.appendChild(card);

        if (SHOW_CARD !== 'none') {
          window._tl.set(card, { display: 'flex', zIndex: 50 + i }, sceneStart);
          window._tl.fromTo(card,
            { opacity: 0, y: 30 },
            { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' },
            sceneStart
          );
        }

        // Handle background transition for EVERY scene if an image is provided
        var imgUrl = s.imageUrl || (i === 0 ? DEFAULT_BG : null);
        if (imgUrl) {
          var targetLayerId = currentBgIndex === 1 ? 'bg-2' : 'bg-1';
          var prevLayerId = currentBgIndex === 1 ? 'bg-1' : 'bg-2';

          (function (lId, url, pId, start) {
            window._tl.set('#' + lId, { attr: { src: url } }, start);
            window._tl.to('#' + lId, { opacity: BG_BRIGHTNESS, duration: 1.0, ease: 'none' }, start);
            window._tl.to('#' + pId, { opacity: 0, duration: 1.0, ease: 'none' }, start);
          })(targetLayerId, imgUrl, prevLayerId, sceneStart);

          currentBgIndex = (currentBgIndex === 1 ? 2 : 1);
        }



        if (i < n - 1) {
          window._tl.to(card, { opacity: 0, y: -20, duration: 0.4, ease: 'power2.in' }, sceneStart + duration - 0.4);
          window._tl.set(card, { display: 'none' }, sceneStart + duration);
        }

        currentTime += duration;
      }

      window._tl.add('end', TOTAL_DURATION);

    } catch (e) {
      console.error('Template Script Error:', e);
    }
  </script>
</body>

</html>
