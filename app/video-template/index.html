<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-accent: {{ ACCENT_COLOR }}; --v-secondary: {{ SECONDARY_COLOR }}; --v-divider: {{ DIVIDER_COLOR }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-size: {{ LOGO_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-body-size: {{ BODY_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-size: {{ TAG_SIZE }}; --v-content-gap: {{ CONTENT_GAP }}; --v-line-height: {{ LINE_HEIGHT }};">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Lumina Template</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    #preloader { position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: calc(var(--v-width) * 1px);
      height: calc(var(--v-height) * 1px);
      overflow: hidden;
      background: #06080e;
      font-family: {{ FONT_FAMILY }}, 'Inter', sans-serif;
    }
    #root {
      position: relative;
      width: 100%;
      height: 100%;
      color: #fff;
      overflow: hidden;
      background: #06080e;
    }
    #bg-layer {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      z-index: 0;
    }
    #bg-layer img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform, opacity;
    }
    #bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg,
        rgba(6,8,14,0.15) 0%,
        rgba(6,8,14,0.50) 50%,
        rgba(6,8,14,0.90) 100%);
    }
    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      mix-blend-mode: screen;
      pointer-events: none;
      will-change: transform;
    }
    .orb-1 { width: 55%; height: 55%; top: -20%; right: -20%; background: var(--v-accent); opacity: 0.10; }
    .orb-2 { width: 45%; height: 45%; bottom: -15%; left: -15%; background: var(--v-secondary); opacity: 0.08; }
    .orb-3 { width: 30%; height: 30%; top: 35%; left: 35%; background: var(--v-divider); opacity: 0.05; }
    .vignette {
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.50) 100%);
      pointer-events: none;
    }
    .brand-header {
      position: absolute;
      top: {{ LOGO_CSS_TOP }};
      left: {{ LOGO_CSS_LEFT }};
      transform: {{ LOGO_CSS_TRANSFORM }};
      z-index: 100;
      display: {{ SHOW_LOGO }};
      align-items: center;
      gap: 14px;
      white-space: nowrap;
      opacity: 0;
    }
    .brand-logo-img {
      height: calc(var(--v-logo-size) * 0.6px);
      width: auto;
      object-fit: contain;
      display: {{ SHOW_LOGO_IMAGE }};
    }
    .brand-logo-text {
      font-weight: 800;
      font-size: calc(var(--v-logo-size) * 0.55px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 30%, var(--v-accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .bottom-bar {
      position: absolute;
      bottom: {{ TAG_CSS_TOP }};
      left: {{ TAG_CSS_LEFT }};
      transform: {{ TAG_CSS_TRANSFORM }};
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 24px;
      opacity: 0;
    }
    .tag-badge {
      display: {{ SHOW_TAG }};
      padding: 10px 32px;
      font-weight: 800;
      font-size: calc(var(--v-tag-size) * 0.5px);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--v-tag-color);
      background: var(--v-tag-bg);
      border-radius: 100px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.30);
      white-space: nowrap;
    }
    .datetime {
      display: {{ SHOW_DATETIME }};
      font-size: calc(var(--v-tag-size) * 0.4px);
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }
    #scene-container {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: {{ MAIN_CSS_ALIGN }};
      justify-content: center;
      text-align: {{ MAIN_CSS_TEXT_ALIGN }};
    }
    .scene-card {
      position: absolute;
      width: 100%;
      max-width: min(88%, 1600px);
      padding: 0 5%;
      display: none;
      flex-direction: column;
      gap: calc(var(--v-content-gap) * 1px);
      opacity: 0;
    }
    .scene-label {
      font-weight: 700;
      font-size: min(22px, 2.2vh);
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--v-accent);
      opacity: 0;
      margin-bottom: 4px;
    }
    .scene-text {
      width: 100%;
    }
    .word-wrapper {
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
      margin-right: 0.18em;
      margin-bottom: -0.08em;
    }
    .word {
      display: inline-block;
      transform: translateY(105%);
      opacity: 0;
      will-change: transform, opacity;
    }
    .word.accent-word {
      background: linear-gradient(135deg, var(--v-accent) 0%, var(--v-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .scene-card.type-hook .scene-text {
      font-weight: 900;
      font-size: calc(var(--v-hook-size) * 0.9px);
      line-height: var(--v-line-height);
      text-transform: uppercase;
      color: var(--v-hook-color);
      text-shadow: 0 2px 30px rgba(0,0,0,0.30);
    }
    .scene-card.type-body .scene-text {
      font-weight: 700;
      font-size: calc(var(--v-body-size) * 0.9px);
      line-height: 1.35;
      color: var(--v-body-color);
      text-shadow: 0 1px 20px rgba(0,0,0,0.25);
    }
    .scene-card.type-outro .scene-text {
      font-weight: 800;
      font-size: calc(var(--v-body-size) * 0.9px);
      line-height: 1.30;
      color: var(--v-body-color);
    }
    .cta-overline {
      font-weight: 700;
      font-size: min(20px, 2vh);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--v-accent);
      opacity: 0;
      margin-bottom: 8px;
    }
    .accent-divider {
      width: 0;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--v-accent), var(--v-secondary));
      opacity: 0;
    }
    .scene-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      display: {{ SHOW_PROGRESS_BAR }};
    }
    .scene-progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--v-accent), var(--v-secondary));
      box-shadow: 0 0 12px var(--v-accent);
      will-change: width;
    }
    .scene-card.no-card-style {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
    }

    /* CSS KEYFRAME ANIMATIONS FOR HYPERFRAMES */
    @keyframes hf-card-enter {
      from { opacity: 0; transform: translate3d(0, 35px, 0); filter: blur(6px); }
      to { opacity: 1; transform: translate3d(0, 0, 0); filter: blur(0px); }
    }
    .card-enter {
      animation: hf-card-enter 750ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes hf-pan-slow-ltr {
      from { transform: translate3d(-30px, -10px, 0) scale(1.15); }
      to { transform: translate3d(30px, 10px, 0) scale(1.15); }
    }
    @keyframes hf-pan-slow-rtl {
      from { transform: translate3d(30px, 10px, 0) scale(1.15); }
      to { transform: translate3d(-30px, -10px, 0) scale(1.15); }
    }
    .pan-slow-ltr {
      animation: hf-pan-slow-ltr linear both;
    }
    .pan-slow-rtl {
      animation: hf-pan-slow-rtl linear both;
    }
  </style>
</head>
<body>
  <div id="root" data-composition-id="main" data-width="{{ WIDTH }}" data-height="{{ HEIGHT }}" data-start="0" data-duration="{{ DURATION }}">
    <div id="bg-layer"></div>
    <div id="bg-overlay"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    <div class="vignette"></div>
    <div id="preloader"></div>
    <div class="brand-header">
      <img class="brand-logo-img" src="{{ LOGO_IMAGE }}" alt="">
      <span class="brand-logo-text">{{ LOGO_TEXT }}</span>
    </div>
    <div id="scene-container"></div>
    <div class="bottom-bar">
      <div class="tag-badge">{{ TAG_TEXT }}</div>
      <div class="datetime">{{ DATETIME }}</div>
    </div>
  </div>
  <script>
    var SCENES_DATA = JSON.parse('{{ SCENES_JSON }}');
    var SCENE_DURATIONS = JSON.parse('{{ SCENE_DURATIONS_JSON }}');
    var TOTAL_DURATION = parseFloat("{{ DURATION }}") || 15;
    var DEFAULT_BG = "{{ BG_IMAGE_URL }}";
    var BG_BRIGHTNESS = parseFloat("{{ BG_BRIGHTNESS }}") || 0.45;
    var MAIN_ALIGN = "{{ MAIN_CSS_ALIGN }}";
    var MAIN_TEXT_ALIGN = "{{ MAIN_CSS_TEXT_ALIGN }}";

    // Preload images
    (function preloadImages() {
      var urls = [DEFAULT_BG];
      SCENES_DATA.forEach(function(s) { if (s.imageUrl) urls.push(s.imageUrl); });
      var unique = Array.from(new Set(urls.filter(Boolean)));
      var el = document.getElementById('preloader');
      unique.forEach(function(url) { var img = new Image(); img.src = url; el.appendChild(img); });
    })();
  </script>
  <script>
    (function() {
      var scenes = SCENES_DATA;
      var n = scenes.length;
      var container = document.getElementById('scene-container');
      var hasDurations = SCENE_DURATIONS && SCENE_DURATIONS.length === n;
      var tl = gsap.timeline({ paused: true });
      window._tl = tl;
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = tl;
      var TEXT_LEAD = 0.30;
      var CROSSFADE = 0.50;
      var currentTime = 0;
      var currentBg = 1;

      function detectAccentWords(text) {
        if (!text) return { tokens: [] };
        var tokens = [];
        var parts = text.split(/(\s+)/);
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          if (p.trim() === '') { tokens.push({ text: p, accent: false }); continue; }
          var clean = p;
          var isAccent = false;
          if (p.startsWith('**') && p.endsWith('**')) { clean = p.slice(2, -2); isAccent = true; }
          else if (p.startsWith('*') && p.endsWith('*')) { clean = p.slice(1, -1); isAccent = true; }
          else if (/^[A-Z]{4,}$/.test(p) && p.length > 3) isAccent = true;
          tokens.push({ text: clean, accent: isAccent });
        }
        return { tokens: tokens };
      }

      tl.from('.brand-header', { y: -30, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0);
      tl.from('.bottom-bar', { y: 30, opacity: 0, duration: 0.6, ease: 'power3.out' }, 0.15);

      var orbDur = Math.min(TOTAL_DURATION, 15);
      var orbRepeat = Math.ceil(TOTAL_DURATION / orbDur) - 1;
      gsap.to('.orb-1', { x: 80, y: 100, duration: orbDur, repeat: orbRepeat, yoyo: true, ease: 'sine.inOut' });
      gsap.to('.orb-2', { x: -80, y: -70, duration: orbDur * 1.2, repeat: orbRepeat, yoyo: true, ease: 'sine.inOut' });
      gsap.to('.orb-3', { x: 50, y: -50, scale: 1.30, duration: orbDur * 0.9, repeat: orbRepeat, yoyo: true, ease: 'sine.inOut' });

      for (var i = 0; i < n; i++) {
        var s = scenes[i];
        var duration = hasDurations ? SCENE_DURATIONS[i] : TOTAL_DURATION / n;
        var sceneStart = Math.max(0, currentTime - (i > 0 ? TEXT_LEAD : 0));
        var isLast = (i === n - 1);
        var card = document.createElement('div');
        card.className = 'scene-card type-' + s.type + ' card-enter';
        card.setAttribute('data-start', sceneStart.toFixed(3));
        card.setAttribute('data-duration', duration.toFixed(3));
        card.style.textAlign = MAIN_TEXT_ALIGN;
        card.style.alignItems = MAIN_ALIGN;
        var safeText = s.bodyText || s.voiceText || '';
        var parsed = detectAccentWords(safeText);
        var wordHtml = '';
        for (var t = 0; t < parsed.tokens.length; t++) {
          var tok = parsed.tokens[t];
          if (tok.text.trim() === '') { wordHtml += tok.text; continue; }
          var cls = tok.accent ? 'word accent-word' : 'word';
          wordHtml += '<span class="word-wrapper"><span class="' + cls + '">' + tok.text + '</span></span>';
        }
        if (s.type === 'hook') {
          card.innerHTML = '<div class="scene-label">FEATURED</div>' +
            '<div class="scene-text">' + wordHtml + '</div>' +
            '<div class="accent-divider"></div>' +
            '<div class="scene-progress"><div class="scene-progress-fill"></div></div>';
        } else if (s.type === 'outro') {
          card.innerHTML = '<div class="cta-overline">DO NOT MISS OUT</div>' +
            '<div class="scene-text">' + wordHtml + '</div>' +
            '<div class="accent-divider"></div>' +
            '<div class="scene-progress"><div class="scene-progress-fill"></div></div>';
        } else {
          card.innerHTML = '<div class="scene-text">' + wordHtml + '</div>' +
            '<div class="accent-divider"></div>' +
            '<div class="scene-progress"><div class="scene-progress-fill"></div></div>';
        }
        container.appendChild(card);
        tl.set(card, { display: 'flex', zIndex: 50 + i }, sceneStart);

        var words = card.querySelectorAll('.word');
        if (words.length > 0) {
          tl.fromTo(words,
            { y: '105%', opacity: 0 },
            { y: '0%', opacity: 1, duration: 0.50, stagger: 0.035, ease: 'back.out(1.5)' },
            sceneStart + 0.15
          );
        }
        var label = card.querySelector('.scene-label');
        if (label) tl.fromTo(label, { opacity: 0, y: -12 }, { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' }, sceneStart + 0.20);
        var ctaLabel = card.querySelector('.cta-overline');
        if (ctaLabel) tl.fromTo(ctaLabel, { opacity: 0, y: -12 }, { opacity: 1, y: 0, duration: 0.45, ease: 'power2.out' }, sceneStart + 0.20);
        var divider = card.querySelector('.accent-divider');
        if (divider) tl.fromTo(divider, { width: 0, opacity: 1 }, { width: 100, duration: 0.60, ease: 'power3.inOut' }, sceneStart + 0.30);
        var progressFill = card.querySelector('.scene-progress-fill');
        if (progressFill) {
          var fillDur = isLast ? duration : duration - CROSSFADE;
          tl.fromTo(progressFill, { width: '0%' }, { width: '100%', duration: fillDur, ease: 'none' }, sceneStart);
        }
        var imgUrl = s.imageUrl || (i === 0 ? DEFAULT_BG : null);
        if (imgUrl) {
          var bgImg = document.createElement('img');
          bgImg.src = imgUrl;
          bgImg.className = i % 2 === 0 ? 'pan-slow-ltr' : 'pan-slow-rtl';
          bgImg.style.position = 'absolute';
          bgImg.style.inset = '0';
          bgImg.style.width = '100%';
          bgImg.style.height = '100%';
          bgImg.style.objectFit = 'cover';
          bgImg.style.willChange = 'transform, opacity';
          bgImg.style.opacity = '0';
          bgImg.style.animationDuration = duration + 's';
          bgImg.setAttribute('data-start', sceneStart.toFixed(3));
          bgImg.setAttribute('data-duration', duration.toFixed(3));
          document.getElementById('bg-layer').appendChild(bgImg);

          tl.fromTo(bgImg, { opacity: 0 }, { opacity: BG_BRIGHTNESS, duration: 1.0, ease: 'power2.out' }, sceneStart);
          if (i < n - 1) {
            tl.to(bgImg, { opacity: 0, duration: 1.0, ease: 'power2.out' }, sceneStart + duration - 1.0);
          }
        }
        if (!isLast) {
          tl.to(card, { opacity: 0, y: -20, filter: 'blur(4px)', duration: CROSSFADE, ease: 'power3.in' }, sceneStart + duration - CROSSFADE);
          tl.set(card, { visibility: 'hidden', zIndex: -1 }, sceneStart + duration + 0.5);
        } else {
          var fadeStart = sceneStart + Math.min(duration - 1.0, duration * 0.7);
          tl.to('#root', { opacity: 0, duration: 1.0, ease: 'power2.inOut' }, fadeStart);
        }
        currentTime += duration;
      }
      tl.add('end', TOTAL_DURATION);
    })();
  </script>
</body>
</html>
