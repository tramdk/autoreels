<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-top: {{ LOGO_CSS_TOP }}; --v-logo-left: {{ LOGO_CSS_LEFT }}; --v-logo-transform: {{ LOGO_CSS_TRANSFORM }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-show: {{ SHOW_TAG }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-main-top: {{ MAIN_CSS_TOP }}; --v-main-left: {{ MAIN_CSS_LEFT }}; --v-main-transform: {{ MAIN_CSS_TRANSFORM }}; --v-main-align: {{ MAIN_CSS_ALIGN }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-content-gap: {{ CONTENT_GAP }}; --v-bg-start: {{ BG_GRADIENT_START }}; --v-bg-end: {{ BG_GRADIENT_END }}; --v-bg-brightness: {{ BG_BRIGHTNESS }};">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Cinematic Template</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    :root {
      --v-bg-brightness: {{ BG_BRIGHTNESS }};
      --cqmin: min(calc(var(--v-width) * 1px), calc(var(--v-height) * 1px));
      --blur-amount: 10px;
    }

    body.is-rendering {
      --blur-amount: 3px;
    }

    body.is-rendering .film-grain {
      opacity: 0.05 !important;
      mix-blend-mode: normal !important;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: calc(var(--v-width) * 1px);
      height: calc(var(--v-height) * 1px);
      overflow: hidden;
      background-color: #000;
      font-family: {{ FONT_FAMILY }};
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    #scenes-container {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .scene-unit {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      z-index: 10;
      overflow: hidden;
    }

    .scene-bg-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.1);
      /* Prevent white edges during blur */
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, var(--v-bg-start) 0%, var(--v-bg-end) 100%);
      z-index: 1;
      opacity: var(--v-bg-brightness);
    }

    .scene-content {
      position: absolute;
      top: calc(4% + var(--v-main-top));
      left: calc(4% + 5%);
      width: 85%;
      height: 80%;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .scene-title {
      font-family: {{ FONT_FAMILY }};
      font-weight: 900;
      line-height: {{ LINE_HEIGHT }};
      text-transform: uppercase;
      color: #ffffff;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      border-radius: 4px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      max-width: 95%;
    }

    .film-grain {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      mix-blend-mode: overlay;
      z-index: 500;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      z-index: 600;
      pointer-events: none;
    }

    .letterbox {
      width: 100%;
      height: 10%;
      background: #000;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .letterbox-top {
      top: 0;
    }

    .letterbox-bottom {
      bottom: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      justify-content: center;
    }

    .letterbox-logo {
      font-family: 'JetBrains Mono';
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: calc(var(--cqmin) * 24 / 720);
      color: rgba(255, 255, 255, 0.7);
    }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'JetBrains Mono';
      font-size: calc(var(--cqmin) * 18 / 720);
      color: rgba(255, 255, 255, 0.7);
    }

    .rec-dot {
      width: 12px;
      height: 12px;
      background: #ff0000;
      border-radius: 50%;
    }

    .tag-badge {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--v-tag-bg);
      color: var(--v-tag-color);
      padding: 8px 24px;
      font-family: 'JetBrains Mono';
      font-size: calc(var(--cqmin) * 20 / 720);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border-radius: 2px;
      display: var(--v-tag-show);
    }

    .scene-progress-container {
      position: absolute;
      bottom: 12%;
      left: 5%;
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 100;
      overflow: hidden;
      display: {{ SHOW_PROGRESS_BAR }};
    }

    .scene-progress-bar {
      width: 0%;
      height: 100%;
      background: #ff0000; /* Matching REC dot */
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="root" data-start="0" data-duration="{{ DURATION }}" data-width="{{ WIDTH }}"
    data-height="{{ HEIGHT }}">
    <div id="scenes-container"></div>
    <div class="film-grain"></div>
    <div class="ui-layer">
      <div class="letterbox letterbox-top">
        <div class="letterbox-logo">{{ LOGO_TEXT }}</div>
        <div class="rec-indicator">
          <div class="rec-dot"></div>
          <div id="datetime-val">{{ DATETIME }}</div>
        </div>
      </div>
      <div class="tag-badge">{{ TAG_TEXT }}</div>
      <div class="letterbox letterbox-bottom">
        <div style="width: 80px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 100px;"></div>
      </div>
    </div>
  </div>
  <script>
    var SCENES_DATA = {{ SCENES_JSON }};
    var SCENE_DURATIONS = {{ SCENE_DURATIONS_JSON }};
    var DEFAULT_BG = {{ BG_IMAGE_URL_JS }};
  </script>
  <script>
    console.log("[Template] Cinematic script starting...");
    var scenes = SCENES_DATA;
    var sceneDurations = SCENE_DURATIONS;
    var container = document.getElementById('scenes-container');

    // --- DOUBLE SAFETY NET (CLIENT-SIDE FALLBACK) ---
    var totalDuration = parseFloat("{{ DURATION }}") || 15;
    if (!sceneDurations || sceneDurations.length === 0) {
      var avg = totalDuration / (scenes.length || 1);
      sceneDurations = [];
      for (var s = 0; s < scenes.length; s++) {
        sceneDurations.push(avg);
      }
    }

    var mainTl = gsap.timeline({ id: "root", paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = mainTl;

    var globalLastImage = DEFAULT_BG;

    function createSceneUnit(scene, i, start, duration) {
      var isHook = (scene.type === 'hook' || i === 0);
      var unit = document.createElement('div');
      unit.id = 'unit-' + i;
      unit.className = 'scene-unit ' + (isHook ? 'scene-hook' : 'scene-body');
      
      // HyperFrames native visibility control via data attributes
      unit.setAttribute('data-start', start.toFixed(3));
      var hfDuration = (i < scenes.length - 1) ? (duration + 0.2) : duration;
      unit.setAttribute('data-duration', hfDuration.toFixed(3));
      unit.setAttribute('data-track-index', "1");
      
      unit.style.zIndex = 100 + i;

      if (scene.imageUrl) globalLastImage = scene.imageUrl;
      var imgUrl = globalLastImage;

      var fontSize = isHook ? '{{ HOOK_SIZE }}' : '{{ BODY_SIZE }}';
      var color = isHook ? '{{ HOOK_COLOR }}' : '{{ BODY_COLOR }}';

      var contentHtml = isHook ? 
        '<div class="scene-label" style="font-family: inter; font-weight: 400; font-size: calc(var(--cqmin) * 20 / 720); letter-spacing: 0.3em; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; margin-bottom: 20px;">CINEMATIC HOOK</div>' +
        '<div class="scene-title hook-title" style="font-family: \'Playfair Display\'; font-size: calc(var(--cqmin) * ' + fontSize + ' / 720); color: ' + color + '; line-height: 1.2; text-shadow: 0 10px 30px rgba(0,0,0,0.5); word-break: break-word;">' + (scene.text || scene.bodyText || '') + '</div>' +
        '<div class="scene-accent" style="width: 100px; height: 1px; background: rgba(255,255,255,0.8); margin-top: 40px; opacity: 0;"></div>' :
        '<div class="scene-title" style="font-size: calc(var(--cqmin) * ' + fontSize + ' / 720); color: ' + color + ';">' + (scene.text || scene.bodyText || '') + '</div>';

      unit.innerHTML = 
        '<div class="scene-bg-container">' +
          '<img class="scene-bg" src="' + imgUrl + '">' +
        '</div>' +
        '<div class="scene-overlay"></div>' +
        '<div class="scene-progress-container"><div class="scene-progress-bar"></div></div>' +
        '<div class="scene-content">' +
          contentHtml +
        '</div>';
      return unit;
    }

    function buildTypingContent(containerEl, text) {
      containerEl.innerHTML = '';
      if (!text) return [];
      var words = text.split(/(\s+)/);
      var spans = [];
      for (var w = 0; w < words.length; w++) {
        var word = words[w];
        var wordSpan = document.createElement('span');
        wordSpan.style.display = 'inline-block';
        wordSpan.style.whiteSpace = 'pre';
        var chars = word.split('');
        for (var c = 0; c < chars.length; c++) {
          var span = document.createElement('span');
          span.textContent = chars[c];
          span.style.opacity = 0;
          wordSpan.appendChild(span);
          spans.push(span);
        }
        containerEl.appendChild(wordSpan);
      }
      return spans;
    }

    var currentTime = 0;
    var CROSSFADE = 0.6;

    for (var i = 0; i < scenes.length; i++) {
      var scene = scenes[i];
      var dur = parseFloat(sceneDurations[i]) || 5;
      var unit = createSceneUnit(scene, i, currentTime, dur);
      container.appendChild(unit);

      var bgImg = unit.querySelector('.scene-bg');
      var titleEl = unit.querySelector('.scene-title');
      var progBar = unit.querySelector('.scene-progress-bar');
      var spans = buildTypingContent(titleEl, (scene.text || scene.bodyText || ''));

      var inDur = 0.6;
      var outDur = CROSSFADE;
      var tl = gsap.timeline();

      // Entrance animation - Fade in
      tl.from(unit, { opacity: 0, duration: inDur, ease: "none", force3D: true }, 0)
        .fromTo(bgImg, { scale: 1.15 }, { scale: 1, duration: dur, ease: "sine.inOut", force3D: true }, 0);

      // Text animation
      var staggerTime = Math.min(0.04, (dur * 0.7) / (spans.length || 1));
      tl.to(spans, { opacity: 1, duration: 0.05, stagger: staggerTime, ease: 'none', force3D: true }, 0.2);
      
      // Progress bar animation
      if (progBar) {
        tl.to(progBar, { width: "100%", duration: dur, ease: "none" }, 0);
      }

      // Exit fade - ONLY fade the content/text, NOT the background/unit
      // This prevents the black background from 'flashing' through during crossfade
      if (i < scenes.length - 1) {
        var content = unit.querySelector('.scene-content');
        var progress = unit.querySelector('.scene-progress-container');
        tl.to([content, progress], { 
          opacity: 0, 
          y: -20,
          duration: outDur, 
          ease: "power2.inOut", 
          force3D: true 
        }, dur - outDur);
      }
      
      mainTl.add(tl, currentTime);
      if (i < scenes.length - 1) {
        currentTime += dur - CROSSFADE;
      } else {
        currentTime += dur;
      }
    }

    var finalDur = parseFloat("{{ DURATION }}") || mainTl.duration() || 15;
    window.duration = finalDur;

    // Fixed repeat counts for deterministic rendering
    var recDotRepeat = Math.ceil(finalDur / 1.0) - 1;
    mainTl.add(gsap.to(".rec-dot", { opacity: 0.3, duration: 0.5, repeat: recDotRepeat, yoyo: true, ease: "sine.inOut" }), 0);

    // Initial state trigger
    mainTl.time(0);
    
    var isRendering = window.__hf && (window.__hf.active || window.__hf.duration);
    if (isRendering) {
      document.body.classList.add('is-rendering');
    }

    if (!window.__hf) {
      setTimeout(function() { mainTl.play(); }, 500);
    }
    
    console.log("[Template] Init complete. Duration: " + finalDur + "s. Scenes: " + scenes.length);
  </script>
</body>
</html>
