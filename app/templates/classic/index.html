<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-top: {{ LOGO_CSS_TOP }}; --v-logo-left: {{ LOGO_CSS_LEFT }}; --v-logo-transform: {{ LOGO_CSS_TRANSFORM }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-top: {{ TAG_CSS_TOP }}; --v-tag-left: {{ TAG_CSS_LEFT }}; --v-tag-transform: {{ TAG_CSS_TRANSFORM }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-main-top: {{ MAIN_CSS_TOP }}; --v-main-left: {{ MAIN_CSS_LEFT }}; --v-main-transform: {{ MAIN_CSS_TRANSFORM }}; --v-main-align: {{ MAIN_CSS_ALIGN }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-content-gap: {{ CONTENT_GAP }};">

<head>
  <script>
    var TOTAL_DURATION = {{ DURATION }};
    var SCENES_DATA = {{ SCENES_JSON }};
    var SCENE_DURATIONS = {{ SCENE_DURATIONS_JSON }};
    var BG_BRIGHTNESS = {{ BG_BRIGHTNESS }};
    var DEFAULT_BG = {{ BG_IMAGE_URL_JS }};
    var LOGO_TEXT = {{ LOGO_TEXT_JS }};
    var DATETIME = {{ DATETIME_JS }};
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Classic Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    :root {
      --cqmin: min({{ WIDTH }} * 1px, {{ HEIGHT }} * 1px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: calc({{ WIDTH }} * 1px);
      height: calc({{ HEIGHT }} * 1px);
      overflow: hidden;
      background-color: #000;
      font-family: {{ FONT_FAMILY }};
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #bg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, {{ BG_GRADIENT_START }} 0%, {{ BG_GRADIENT_END }} 100%);
      z-index: 1;
      opacity: {{ BG_BRIGHTNESS }};
    }

    .logo-text {
      position: absolute;
      top: {{ LOGO_CSS_TOP }};
      left: {{ LOGO_CSS_LEFT }};
      transform: {{ LOGO_CSS_TRANSFORM }};
      color: {{ LOGO_COLOR }};
      font-size: calc(var(--cqmin) * {{ LOGO_SIZE }} / 720);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
      z-index: 100;
      white-space: nowrap;
      display: {{ SHOW_LOGO }};
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      height: 1.2em;
      width: auto;
      object-fit: contain;
      display: {{ SHOW_LOGO_IMAGE }};
    }

    .tag-container {
      position: absolute;
      top: {{ TAG_CSS_TOP }};
      left: {{ TAG_CSS_LEFT }};
      transform: {{ TAG_CSS_TRANSFORM }};
      display: {{ SHOW_TAG }};
      align-items: center;
      gap: 30px;
      z-index: 100;
      white-space: nowrap;
    }

    .tag-badge {
      background: {{ TAG_BG }};
      color: {{ TAG_COLOR }};
      padding: 10px 40px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: calc(var(--cqmin) * {{ TAG_SIZE }} / 720);
      border-radius: 4px;
    }

    .datetime-text {
      color: rgba(255, 255, 255, 0.6);
      font-size: calc(var(--cqmin) * 20 / 720);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    #main-content {
      position: absolute;
      top: {{ MAIN_CSS_TOP }};
      left: {{ MAIN_CSS_LEFT }};
      transform: {{ MAIN_CSS_TRANSFORM }};
      z-index: 50;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: {{ MAIN_CSS_ALIGN }};
      gap: {{ CONTENT_GAP }}px;
    }

    .scene-box {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: {{ MAIN_CSS_ALIGN }};
      gap: 20px;
      text-align: {{ MAIN_CSS_TEXT_ALIGN }};
    }

    .trending-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: calc(var(--cqmin) * 24 / 720);
      font-weight: 900;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .scene-title {
      font-family: {{ FONT_FAMILY }};
      font-size: calc(var(--cqmin) * {{ HOOK_SIZE }} / 720);
      font-weight: 900;
      line-height: {{ LINE_HEIGHT }};
      text-transform: uppercase;
      color: {{ HOOK_COLOR }};
    }

    .scene-body {
      font-family: {{ FONT_FAMILY }};
      font-size: calc(var(--cqmin) * {{ BODY_SIZE }} / 720);
      font-weight: 700;
      line-height: {{ LINE_HEIGHT }};
      color: {{ BODY_COLOR }};
      opacity: 0.9;
    }

    .divider {
      width: 100px;
      height: 6px;
      background: {{ DIVIDER_COLOR }};
      border-radius: 100px;
    }

  </style>
</head>

<body>
  <div id="root" data-composition-id="root" data-duration="{{ DURATION }}" data-width="{{ WIDTH }}" data-height="{{ HEIGHT }}" style="--v-bg-brightness: {{ BG_BRIGHTNESS }};">
    <img id="bg-image" class="bg-layer" src="{{ BG_IMAGE_URL }}" alt="" onerror="this.style.display='none'">
    <div id="bg-overlay"></div>

    <div class="logo-text">
      <img class="logo-img" src="{{ LOGO_IMAGE }}" alt="">
      {{ LOGO_TEXT }}
    </div>

    <div class="tag-container">
      <div class="tag-badge">{{ TAG_TEXT }}</div>
      <div class="datetime-text">{{ DATETIME }}</div>
    </div>

    <div id="main-content"></div>
  </div>

  <script>
    var scenes = SCENES_DATA;
    var sceneDurations = SCENE_DURATIONS;

    // Use root ID for consistency
    var mainTl = gsap.timeline({ id: "root", paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = mainTl;

    var currentTime = 0;
    for (var i = 0; i < scenes.length; i++) {
      var scene = scenes[i];
      var duration = sceneDurations[i] || 5;
      var sceneId = 'scene-' + i;
      
      var sceneEl = document.createElement('div');
      sceneEl.id = sceneId;
      sceneEl.className = 'scene-box type-' + scene.type;
      
      // HyperFrames native visibility control
      sceneEl.setAttribute('data-start', currentTime.toFixed(3));
      sceneEl.setAttribute('data-duration', duration.toFixed(3));
      sceneEl.setAttribute('data-track-index', "1");

      var html = '';
      if (scene.type === 'hook') {
        html += '<div class="trending-label">TRENDING</div>';
      }
      var fontSizeKey = (scene.type === 'hook' ? '{{ HOOK_SIZE }}' : '{{ BODY_SIZE }}');
      html += '<div class="scene-title" style="font-size: calc(var(--cqmin) * ' + fontSizeKey + ' / 720)">' + (scene.text || scene.bodyText || '') + '</div>';
      html += '<div class="divider"></div>';
      
      sceneEl.innerHTML = html;
      document.getElementById('main-content').appendChild(sceneEl);

      var tl = gsap.timeline();
      tl.from(sceneEl, { opacity: 0, scale: 0.95, duration: 0.8, ease: "power4.out" }).to(sceneEl, { opacity: 0, scale: 1.05, duration: 0.8, ease: "power4.in" }, (duration - 0.8)
      );
      
      mainTl.add(tl, currentTime);
      currentTime += duration;
    }

    var finalDur = parseFloat("{{ DURATION }}") || mainTl.duration() || 15;
    window.duration = finalDur;

    mainTl.time(0);
    if (!window.__hf) {
      setTimeout(function() { mainTl.play(); }, 500);
    }
    console.log("[Template] Init complete. Duration: " + finalDur + "s");
  </script>
</body>
</html>
