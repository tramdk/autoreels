<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-top: {{ LOGO_CSS_TOP }}; --v-logo-left: {{ LOGO_CSS_LEFT }}; --v-logo-transform: {{ LOGO_CSS_TRANSFORM }}; --v-logo-show: {{ SHOW_LOGO }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-show: {{ SHOW_TAG }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-main-top: {{ MAIN_CSS_TOP }}; --v-main-left: {{ MAIN_CSS_LEFT }}; --v-main-transform: {{ MAIN_CSS_TRANSFORM }}; --v-main-align: {{ MAIN_CSS_ALIGN }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-content-gap: {{ CONTENT_GAP }}; --v-bg-start: {{ BG_GRADIENT_START }}; --v-bg-end: {{ BG_GRADIENT_END }}; --v-bg-brightness: {{ BG_BRIGHTNESS }};">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Ultra Modern Template</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    :root {
      --cqmin: min(calc(var(--v-width) * 1px), calc(var(--v-height) * 1px));
      --accent: var(--v-divider-color);
      --blur-amount: 12px;
    }

    body.is-rendering {
      --blur-amount: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: calc(var(--v-width) * 1px);
      height: calc(var(--v-height) * 1px);
      overflow: hidden;
      background-color: #000;
      font-family: {{ FONT_FAMILY }};
      will-change: transform, opacity;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    #scenes-container {
      position: absolute;
      inset: 0;
      z-index: 10;
    }

    .scene-unit {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      z-index: 10;
      overflow: hidden;
    }

    .scene-bg-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform;
    }

    .scene-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.8) 100%);
      z-index: 1;
      opacity: var(--v-bg-brightness);
    }

    .scene-content {
      position: absolute;
      top: var(--v-main-top);
      left: var(--v-main-left);
      transform: var(--v-main-transform);
      width: 88%;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: var(--v-main-align);
      gap: 20px;
    }

    .modern-label-box {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .trending-tag {
      background: var(--accent);
      color: #000;
      padding: 6px 20px;
      font-size: calc(var(--cqmin) * 18 / 720);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 4px;
    }

    .label-line {
      width: 40px;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
    }

    .scene-title {
      font-family: {{ FONT_FAMILY }};
      font-weight: 800;
      line-height: {{ LINE_HEIGHT }};
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #ffffff;
      width: 100%;
      text-align: inherit;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    .type-hook .scene-title {
      font-size: calc(var(--cqmin) * var(--v-hook-size) / 720);
      color: var(--v-hook-color);
    }

    .type-body .scene-title {
      font-size: calc(var(--cqmin) * var(--v-body-size) / 720);
      color: var(--v-body-color);
    }

    .scene-progress-container {
      width: 100px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 30px;
      border-radius: 100px;
      overflow: hidden;
      display: {{ SHOW_PROGRESS_BAR }};
    }

    .scene-progress-bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      z-index: 600;
      pointer-events: none;
    }

    .logo-text {
      position: absolute;
      top: var(--v-logo-top);
      left: var(--v-logo-left);
      transform: var(--v-logo-transform);
      color: var(--v-logo-color);
      font-size: calc(var(--cqmin) * var(--v-logo-size) / 720);
      font-weight: 800;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      white-space: nowrap;
      display: var(--v-logo-show);
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      height: 1.2em;
      width: auto;
      object-fit: contain;
      display: {{ SHOW_LOGO_IMAGE }};
    }

    .tag-container {
      position: absolute;
      top: var(--v-tag-top);
      left: var(--v-tag-left);
      transform: var(--v-tag-transform);
      display: var(--v-tag-show);
      align-items: center;
      gap: 30px;
      white-space: nowrap;
    }

    .tag-badge {
      background: var(--v-tag-bg);
      color: var(--v-tag-color);
      padding: 10px 30px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: calc(var(--cqmin) * var(--v-tag-size) / 720);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .datetime-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: calc(var(--cqmin) * 18 / 720);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Modern geometric accents */
    .geometric-accent {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      top: 10%;
      right: 5%;
      opacity: 0.5;
    }

  </style>
</head>

<body>
  <div id="root" data-composition-id="root" data-start="0" data-duration="{{ DURATION }}" data-width="{{ WIDTH }}"
    data-height="{{ HEIGHT }}">
    <div id="scenes-container"></div>
    <div class="geometric-accent"></div>
    <div class="ui-layer">
      <div class="logo-text">
        <img class="logo-img" src="{{ LOGO_IMAGE }}" alt="">
        {{ LOGO_TEXT }}
      </div>
      <div class="tag-container">
        <div class="tag-badge">{{ TAG_TEXT }}</div>
        <div class="datetime-text">{{ DATETIME }}</div>
      </div>
    </div>
  </div>

  <script>
    var SCENES_DATA = JSON.parse('{{ SCENES_JSON }}');
    var SCENE_DURATIONS = JSON.parse('{{ SCENE_DURATIONS_JSON }}');
    var DEFAULT_BG = "{{ BG_IMAGE_URL }}";
  </script>

  <script>
    var scenes = SCENES_DATA;
    var sceneDurations = SCENE_DURATIONS;
    var container = document.getElementById('scenes-container');

    var totalDuration = parseFloat("{{ DURATION }}") || 15;
    if (!sceneDurations || sceneDurations.length === 0) {
      var avg = totalDuration / (scenes.length || 1);
      sceneDurations = [];
      for (var s = 0; s < scenes.length; s++) {
        sceneDurations.push(avg);
      }
    }

    var mainTl = gsap.timeline({ id: "root", paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = mainTl;

    var globalLastImage = DEFAULT_BG;

    function createSceneUnit(scene, i, start, duration) {
      var isHook = (scene.type === 'hook' || i === 0);
      var unit = document.createElement('div');
      unit.id = 'unit-' + i;
      unit.className = 'scene-unit ' + (isHook ? 'type-hook' : 'type-body');
      
      unit.setAttribute('data-start', start.toFixed(3));
      var hfDuration = (i < scenes.length - 1) ? (duration + 0.2) : duration;
      unit.setAttribute('data-duration', hfDuration.toFixed(3));
      unit.setAttribute('data-track-index', "1");
      
      unit.style.zIndex = 100 + i;

      if (scene.imageUrl) globalLastImage = scene.imageUrl;
      var imgUrl = globalLastImage;

      unit.innerHTML = 
        '<div class="scene-bg-container">' +
          '<img class="scene-bg" src="' + imgUrl + '">' +
        '</div>' +
        '<div class="scene-overlay"></div>' +
        '<div class="scene-content" style="text-align: {{ MAIN_CSS_TEXT_ALIGN }};">' +
          '<div class="modern-label-box">' +
            (isHook ? '<div class="trending-tag">EXCLUSIVE</div>' : '<div class="label-line"></div>') +
          '</div>' +
          '<div class="scene-title">' + (scene.text || scene.bodyText || '') + '</div>' +
          '<div class="scene-progress-container">' +
            '<div class="scene-progress-bar"></div>' +
          '</div>' +
        '</div>';
      return unit;
    }

    function buildTypingContent(containerEl, text) {
      containerEl.innerHTML = '';
      if (!text) return [];
      var words = text.split(/(\s+)/);
      var spans = [];
      for (var w = 0; w < words.length; w++) {
        var word = words[w];
        var wordSpan = document.createElement('span');
        wordSpan.style.display = 'inline-block';
        wordSpan.style.whiteSpace = 'pre';
        var chars = word.split('');
        for (var c = 0; c < chars.length; c++) {
          var span = document.createElement('span');
          span.textContent = chars[c];
          span.style.opacity = 0;
          wordSpan.appendChild(span);
          spans.push(span);
        }
        containerEl.appendChild(wordSpan);
      }
      return spans;
    }

    var currentTime = 0;
    var CROSSFADE = 0.6; // Match transition duration exactly

    for (var i = 0; i < scenes.length; i++) {
      var scene = scenes[i];
      var dur = parseFloat(sceneDurations[i]) || 5;
      var unit = createSceneUnit(scene, i, currentTime, dur);
      container.appendChild(unit);

      var bgImg = unit.querySelector('.scene-bg');
      var titleEl = unit.querySelector('.scene-title');
      var progBar = unit.querySelector('.scene-progress-bar');
      var spans = buildTypingContent(titleEl, (scene.text || scene.bodyText || ''));

      var inDur = 0.6;
      var outDur = CROSSFADE;
      var tl = gsap.timeline();

      // Modern slick animation - Fade in
      tl.from(unit, { opacity: 0, duration: inDur, ease: "none", force3D: true }, 0)
        .fromTo(bgImg, { scale: 1.15 }, { scale: 1, duration: dur, ease: "none", force3D: true }, 0)
        .from(unit.querySelector('.scene-content'), { y: 30, opacity: 0, duration: 0.6, ease: "expo.out", force3D: true }, 0.15);

      var staggerTime = Math.min(0.03, (dur * 0.6) / (spans.length || 1));
      tl.to(spans, { opacity: 1, duration: 0.05, stagger: staggerTime, ease: 'none', force3D: true }, 0.3);
      
      // Progress bar animation
      tl.to(progBar, { width: "100%", duration: dur, ease: "none" }, 0);

      // Exit fade - ONLY content, NOT background
      if (i < scenes.length - 1) {
        tl.to(unit.querySelector('.scene-content'), { 
          opacity: 0, 
          y: -30,
          duration: outDur, 
          ease: "power2.inOut", 
          force3D: true 
        }, dur - outDur);
      }
      mainTl.add(tl, currentTime);
      
      // Cleanup: Hide unit after next scene arrives
      if (i < scenes.length - 1) {
        mainTl.add(gsap.set(unit, { visibility: 'hidden' }), currentTime + dur);
        currentTime += dur - CROSSFADE;
      } else {
        currentTime += dur;
      }
    }

    var finalDur = parseFloat("{{ DURATION }}") || mainTl.duration() || 15;
    window.duration = finalDur;

    mainTl.time(0);
    var isRendering = window.__hf && (window.__hf.active || window.__hf.duration);
    if (isRendering) {
      document.body.classList.add('is-rendering');
    }

    if (!window.__hf) {
      setTimeout(function() { mainTl.play(); }, 500);
    }
    console.log("[Template] Ultra Modern Init complete.");
  </script>
</body>
</html>
