<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, user-scalable=no">
  <title>AutoReels Template - Modern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background-color: #000;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
      background-color: #111;
      color: white;
      overflow: hidden;
    }

    /* Background */
    .bg-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #bg-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, rgba(0,0,0,0.85) 70%);
      z-index: 1;
    }

    /* Brand */
    #brand-header {
      position: absolute;
      top: {{LOGO_TOP}}px;
      left: 80px;
      z-index: 100;
      text-align: left;
    }
    #brand-logo {
      font-family: 'Anton', sans-serif;
      font-size: {{LOGO_SIZE}}px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a855f7;
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
    }

    /* Bottom bar */
    #bottom-info {
      position: absolute;
      top: {{TAG_TOP}}px;
      left: 50%;
      transform: translateX(-50%) translateX({{TAG_LEFT}}px);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      white-space: nowrap;
    }
    #tag-badge {
      padding: 12px 30px;
      font-family: 'Anton', sans-serif;
      font-size: {{TAG_SIZE}}px;
      text-transform: uppercase;
      background-color: {{TAG_BG}};
      color: {{TAG_COLOR}};
      transform: skewX(-12deg);
      letter-spacing: 2px;
    }
    #datetime {
      font-size: 26px;
      color: rgba(255,255,255,0.55);
      font-weight: 700;
      letter-spacing: 2px;
    }



    /* Scene cards */
    #scene-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 50;
    }
    .scene-card {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: {{MAIN_TOP}}px;
      padding-left: {{MAIN_LEFT}}px;
      padding-right: {{MAIN_LEFT}}px;
      gap: {{CONTENT_GAP}}px;
      opacity: 0;
      pointer-events: none;
      word-wrap: break-word;
      overflow-wrap: break-word;

      /* Dynamic styles */
      background-color: {{CARD_BG_COLOR}};
      border-top: {{CARD_BORDER_TOP}}px solid {{CARD_BORDER_COLOR}};
      border-bottom: {{CARD_BORDER_BOTTOM}}px solid {{CARD_BORDER_COLOR}};
      border-left: {{CARD_BORDER_LEFT}}px solid {{CARD_BORDER_COLOR}};
      border-right: {{CARD_BORDER_RIGHT}}px solid {{CARD_BORDER_COLOR}};
      border-radius: {{CARD_BORDER_RADIUS}}px;
    }

    /* Hook scene */
    .scene-card.type-hook .scene-label {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      letter-spacing: 8px;
      color: #a855f7;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .scene-card.type-hook .scene-text {
      font-family: 'Anton', sans-serif;
      font-size: {{HOOK_SIZE}}px;
      line-height: 1.25;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 4px 60px rgba(168, 85, 247, 0.4);
      word-break: break-word;
    }
    .scene-card.type-hook .scene-accent {
      width: 0;
      height: 6px;
      border-radius: 4px;
      background: #a855f7;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
    }

    /* Body scene */

    .scene-card.type-body .scene-text {
      font-size: {{BODY_SIZE}}px;
      font-weight: 700;
      line-height: 1.35;
      color: {{BODY_COLOR}};
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      position: relative;
      z-index: 2;
    }

    .scene-text span {
      /* opacity: 0; */
      display: inline-block;
      white-space: pre-wrap;
    }
    .scene-card.type-body .scene-bar {
      width: 60px;
      height: 5px;
      border-radius: 3px;
      background: #a855f7;
    }

    /* Outro scene */
    .scene-card.type-outro {
      justify-content: flex-start;
    }
    .scene-card.type-outro .scene-cta-label {
      font-family: 'Anton', sans-serif;
      font-size: 32px;
      letter-spacing: 6px;
      color: {{TAG_BG}};
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .scene-card.type-outro .scene-text {
      font-size: {{BODY_SIZE}}px;
      font-weight: 700;
      line-height: 1.35;
      color: {{BODY_COLOR}};
    }
    .scene-card.type-outro .scene-follow {
      margin-top: 40px;
      font-size: 36px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="main" data-width="1080" data-height="1920" data-start="0">

    <div id="bg-layers">
      <img id="bg-1" class="bg-layer" src="{{BG_IMAGE_URL}}" style="opacity: {{BG_BRIGHTNESS}};" alt="">
      <img id="bg-2" class="bg-layer" style="opacity: 0;" alt="">
    </div>
    <div id="bg-overlay"></div>

    <div id="brand-header" style="display: {{SHOW_LOGO}};">
      <h1 id="brand-logo" style="color: {{LOGO_COLOR}}; font-size: {{LOGO_SIZE}}px;">{{LOGO_TEXT}}</h1>
    </div>


    <div id="scene-container"></div>

    <div id="bottom-info">
      <div id="tag-badge" style="display: {{SHOW_TAG}}; background: {{TAG_BG}}; color: {{TAG_COLOR}}; font-size: {{TAG_SIZE}}px;">{{TAG_TEXT}}</div>
      <div id="datetime" style="display: {{SHOW_DATETIME}};">{{DATETIME}}</div>
    </div>

  </div>

  <script>
    window.__hf = {
      duration: {{DURATION}},
      seek: function(t) {
        if (window._tl && typeof window._tl.seek === 'function') {
          window._tl.pause().seek(t);
        }
      }
    };
  </script>

  <script>
    var SCENES_DATA = {{SCENES_JSON}};
    var SCENE_DURATIONS = {{SCENE_DURATIONS_JSON}};
    var TOTAL_DURATION = {{DURATION}};
  </script>

  <script>
    try {
      if (typeof gsap === 'undefined') throw new Error('GSAP not loaded');

      var scenes = SCENES_DATA;
      var n = scenes.length;
      var container = document.getElementById('scene-container');
      
      var hasDurations = SCENE_DURATIONS && SCENE_DURATIONS.length === n;
      var leadIn = 0.5;
      var animIn  = 0.4;
      var animOut = 0.4;

      window._tl = gsap.timeline({ paused: true });
      window.__timelines = { 'main': window._tl };

      window._tl.from('#brand-header', { y: -60, opacity: 0, duration: 0.6 }, 0);
      window._tl.from('#bottom-info',  { y:  60, opacity: 0, duration: 0.6 }, 0.2);

      var defaultBg = '{{BG_IMAGE_URL}}';
      var currentBgIndex = 1;
      var currentTime = leadIn;

      for (var i = 0; i < n; i++) {
        var s = scenes[i];
        var duration = hasDurations ? SCENE_DURATIONS[i] : (TOTAL_DURATION - leadIn) / n;
        var sceneStart = currentTime;
        
        var card = document.createElement('div');
        card.className = 'scene-card type-' + s.type;
        card.style.display = '{{SHOW_CARD}}';

        function buildTypingContent(containerEl, text) {
          containerEl.innerHTML = '';
          var words = text.split(/(\s+)/);
          var spans = [];
          words.forEach(function(word) {
            var wordSpan = document.createElement('span');
            wordSpan.style.display = 'inline-block';
            wordSpan.style.whiteSpace = 'pre';
            
            var chars = word.split('');
            chars.forEach(function(char) {
              var span = document.createElement('span');
              span.textContent = char;
              span.style.opacity = 0;
              wordSpan.appendChild(span);
              spans.push(span);
            });
            containerEl.appendChild(wordSpan);
          });
          return spans;
        }

        var textEl = document.createElement('div');
        textEl.className = 'scene-text';

        // Limit height and prepare for scrolling
        var maxH = Math.max(400, {{TAG_TOP}} - {{MAIN_TOP}} - 80);
        card.style.maxHeight = maxH + 'px';
        card.style.overflow = 'hidden';

        if (s.type === 'hook') {
          card.innerHTML = '<div class="scene-label">TRENDING</div>';
          textEl.style.color = '{{HOOK_COLOR}}';
          textEl.style.fontSize = '{{HOOK_SIZE}}px';
        } else if (s.type === 'outro') {
          card.innerHTML = '<div class="scene-cta-label">JOIN US</div>';
          textEl.style.color = '{{BODY_COLOR}}';
          textEl.style.fontSize = '{{BODY_SIZE}}px';
        } else {
          textEl.style.color = '{{BODY_COLOR}}';
          textEl.style.fontSize = '{{BODY_SIZE}}px';
        }

        var spans = buildTypingContent(textEl, s.voiceText);
        card.appendChild(textEl);
        container.appendChild(card);

        window._tl.to(card, { opacity: 1, duration: animIn }, sceneStart);

        // Calculate scroll if content overflows
        var realH = textEl.offsetHeight + (s.type !== 'body' ? 120 : 40);
        if (realH > maxH) {
          var over = realH - maxH + 60;
          window._tl.to(textEl, { 
            y: -over, 
            duration: duration * 0.7, 
            ease: 'none' 
          }, sceneStart + (duration * 0.15));
        }

        var staggerTime = Math.min(0.04, (duration * 0.7) / (spans.length || 1));
        window._tl.to(spans, {
          opacity: 1,
          duration: 0.05,
          stagger: staggerTime,
          ease: 'none'
        }, sceneStart + 0.2);
        
        // Background Cross-fade logic (on main timeline)
        if (i > 0) {
          var nextUrl = s.imageUrl || defaultBg;
          var targetLayerId = currentBgIndex === 1 ? 'bg-2' : 'bg-1';
          var prevLayerId = currentBgIndex === 1 ? 'bg-1' : 'bg-2';
          
          (function(lId, url) {
            window._tl.set('#' + lId, { attr: { src: url } }, sceneStart);
          })(targetLayerId, nextUrl);

          window._tl.to('#' + targetLayerId, { opacity: {{BG_BRIGHTNESS}}, duration: 1.0, ease: 'none' }, sceneStart);
          window._tl.to('#' + prevLayerId, { opacity: 0, duration: 1.0, ease: 'none' }, sceneStart);
          
          currentBgIndex = (currentBgIndex === 1 ? 2 : 1);
        }



        if (i < n - 1) {
          window._tl.to(card, { opacity: 0, duration: animOut }, sceneStart + duration - animOut);
        }
        currentTime += duration;
      }
      window._tl.add(function() {}, TOTAL_DURATION);

    } catch(e) {
      console.error('Scene Animation Init Error:', e);
    }
  </script>
</body>

</html>
