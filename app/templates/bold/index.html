<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, user-scalable=no">
  <title>AutoReels Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background-color: #000;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
      background-color: #000000;
      color: white;
      overflow: hidden;
    }

    /* Background */
    .bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
    }

    #bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0.8) 100%);
      z-index: 1;
    }

    /* Brand */
    #brand-header {
      position: absolute;
      top: 60px;
      left: 60px;
      z-index: 100;
    }

    #brand-logo {
      font-family: 'Anton', sans-serif;
      font-size: 50px;
      color: #fff000;
      text-transform: uppercase;
      background: black;
      padding: 5px 20px;
    }

    /* Bottom bar */
    #bottom-info {
      position: absolute;

      top: {
          {
          TAG_TOP
        }
      }

      px;
      left: 50%;

      transform: translateX(-50%) translateX({
          {
          TAG_LEFT
        }
      }

      px);
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 100;
    white-space: nowrap;
    }

    #tag-badge {
      padding: 12px 30px;
      font-family: 'Anton', sans-serif;

      font-size: {
          {
          TAG_SIZE
        }
      }

      px;
      text-transform: uppercase;

      background-color: {
          {
          TAG_BG
        }
      }

      ;

      color: {
          {
          TAG_COLOR
        }
      }

      ;
      transform: skewX(-12deg);
      letter-spacing: 2px;
    }

    #datetime {
      font-size: 26px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 700;
      letter-spacing: 2px;
    }



    /* Scene cards */
    #scene-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
    }

    .scene-card {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      padding: 0 {
          {
          MAIN_LEFT
        }
      }

      px;
      gap: 40px;
      opacity: 0;
      pointer-events: none;
      word-wrap: break-word;
      overflow-wrap: break-word;

      /* Dynamic styles */
      background-color: {
          {
          CARD_BG_COLOR
        }
      }

      ;

      border-top: {
          {
          CARD_BORDER_TOP
        }
      }

      px solid {
          {
          CARD_BORDER_COLOR
        }
      }

      ;

      border-bottom: {
          {
          CARD_BORDER_BOTTOM
        }
      }

      px solid {
          {
          CARD_BORDER_COLOR
        }
      }

      ;

      border-left: {
          {
          CARD_BORDER_LEFT
        }
      }

      px solid {
          {
          CARD_BORDER_COLOR
        }
      }

      ;

      border-right: {
          {
          CARD_BORDER_RIGHT
        }
      }

      px solid {
          {
          CARD_BORDER_COLOR
        }
      }

      ;

      border-radius: {
          {
          CARD_BORDER_RADIUS
        }
      }

      px;
    }

    /* Hook scene */
    .scene-card.type-hook .scene-label {
      background: #fff000;
      color: black;
      font-family: 'Anton', sans-serif;
      font-size: 40px;
      padding: 10px 40px;
      transform: rotate(-3deg);
    }

    .scene-card.type-hook .scene-text {
      font-family: 'Anton', sans-serif;
      font-size: 140px; /* Reduced from 160px to prevent overflow */
      color: #fff000;
      line-height: 1.1; /* Increased from 0.9 to prevent line overlap */
      text-transform: uppercase;
      text-shadow: 10px 10px 0px black;
      word-break: break-word;
    }

    .scene-card.type-hook .scene-accent {
      display: none;
    }


    .scene-card.type-body .scene-text {
      font-size: {
          {
          BODY_SIZE
        }
      }

      px;
      font-weight: 700;
      line-height: 1.35;

      color: {
          {
          BODY_COLOR
        }
      }

      ;
      text-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }

    .scene-text span {
      /* opacity: 0; */
      display: inline-block;
      white-space: pre-wrap;
    }

    .scene-card.type-body .scene-text {
      position: relative;
      z-index: 2;
    }

    .scene-card.type-body .scene-bar {
      width: 60px;
      height: 5px;
      border-radius: 3px;

      background: {
          {
          DIVIDER_COLOR
        }
      }

      ;
    }

    /* Outro scene */
    .scene-card.type-outro {
      justify-content: flex-start;
    }

    .scene-card.type-outro .scene-cta-label {
      font-family: 'Anton', sans-serif;
      font-size: 32px;
      letter-spacing: 6px;

      color: {
          {
          TAG_BG
        }
      }

      ;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .scene-card.type-outro .scene-text {
      font-size: {
          {
          BODY_SIZE
        }
      }

      px;
      font-weight: 700;
      line-height: 1.35;

      color: {
          {
          BODY_COLOR
        }
      }

      ;
    }

    .scene-card.type-outro .scene-follow {
      margin-top: 40px;
      font-size: 36px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="main" data-width="1080" data-height="1920" data-start="0">

    <div id="bg-layers">
      <img id="bg-1" class="bg-layer" src="{{BG_IMAGE_URL}}" style="opacity: {{BG_BRIGHTNESS}};" alt="">
      <img id="bg-2" class="bg-layer" style="opacity: 0;" alt="">
    </div>
    <div id="bg-overlay"></div>

    <div id="brand-header" style="display: {{SHOW_LOGO}};">
      <h1 id="brand-logo">{{LOGO_TEXT}}</h1>
    </div>


    <div id="scene-container" style="display: {{SHOW_CARD}};"></div>

    <div id="bottom-info">
      <div id="tag-badge" style="display: {{SHOW_TAG}};">{{TAG_TEXT}}</div>
      <div id="datetime" style="display: {{SHOW_DATETIME}};">{{DATETIME}}</div>
    </div>

  </div>

  <script>
    // 1. MUST EXPOSE API IMMEDIATELY
    window.__hf = {
      duration: {{ DURATION }},
    seek: function(t) {
      if (window._tl && typeof window._tl.seek === 'function') {
        window._tl.pause().seek(t);
      }
    }
    };
  </script>

  <script>
    // 2. SCENE DATA (injected by renderer)
    var SCENES_DATA = {{ SCENES_JSON }};
    var TOTAL_DURATION = {{ DURATION }};
    var LOGO_COLOR = '{{LOGO_COLOR}}';
    var TAG_BG = '{{TAG_BG}}';
  </script>

  <script>
    // 3. BUILD SCENE CARDS + ANIMATE
    try {
      if (typeof gsap === 'undefined') throw new Error('GSAP not loaded');

      var scenes = SCENES_DATA;
      var n = scenes.length;
      var container = document.getElementById('scene-container');

      // Timing: reserve 0.5s lead-in, divide rest evenly
      var leadIn = 0.5;
      var usable = TOTAL_DURATION - leadIn;
      var sceneDuration = usable / n;    // time each scene owns
      var animIn = Math.min(0.7, sceneDuration * 0.25);
      var animOut = Math.min(0.5, sceneDuration * 0.2);
      var holdStart = animIn;
      var holdEnd = sceneDuration - animOut;

      window._tl = gsap.timeline({ paused: true });
      window.__timelines = window.__timelines || {};
      window.__timelines['main'] = window._tl;

      // Animate brand + bottom in once at start
      window._tl.from('#brand-header', { y: -60, opacity: 0, duration: 0.6, ease: 'power2.out' }, 0);
      window._tl.from('#bottom-info', { y: 60, opacity: 0, duration: 0.6, ease: 'power2.out' }, 0.2);

      var defaultBg = '{{BG_IMAGE_URL}}';
      var currentBgIndex = 1;

      // Build each scene card
      for (var i = 0; i < n; i++) {
        var s = scenes[i];
        var sceneStart = leadIn + i * sceneDuration;
        var card = document.createElement('div');
        card.className = 'scene-card type-' + s.type;
        card.id = 'scene-' + i;

        function buildTypingContent(containerEl, text) {
          containerEl.innerHTML = '';
          var words = text.split(/(\s+)/);
          var spans = [];
          words.forEach(function(word) {
            var wordSpan = document.createElement('span');
            wordSpan.style.display = 'inline-block';
            wordSpan.style.whiteSpace = 'pre';
            
            var chars = word.split('');
            chars.forEach(function(char) {
              var span = document.createElement('span');
              span.textContent = char;
              span.style.opacity = 0;
              wordSpan.appendChild(span);
              spans.push(span);
            });
            containerEl.appendChild(wordSpan);
          });
          return spans;
        }

        var textEl = document.createElement('div');
        textEl.className = 'scene-text';

        if (s.type === 'hook') {
          card.innerHTML =
            '<div class="scene-label">&#9679; BREAKING</div>' +
            '<div class="scene-accent" id="scene-accent-' + i + '"></div>';
        } else if (s.type === 'outro') {
          card.innerHTML =
            '<div class="scene-cta-label">&#128172; Bình luận ngay</div>' +
            '<div class="scene-follow">Theo dõi để không bỏ lỡ.</div>';
        } else {
          card.innerHTML =
            '<div class="scene-bar"></div>';
        }

        var spans = buildTypingContent(textEl, s.voiceText);
        card.appendChild(textEl);
        container.appendChild(card);

        // Animate IN
        window._tl.to(card, { opacity: 1, duration: animIn, ease: 'power2.out' }, sceneStart);
        if (s.type === 'hook') {
          window._tl.from(textEl, { y: 80, duration: animIn * 1.2, ease: 'back.out(1.5)' }, sceneStart);
          var accentEl = card.querySelector('.scene-accent');
          if (accentEl) {
            window._tl.to(accentEl, { width: 180, duration: 0.6, ease: 'power2.inOut' }, sceneStart + animIn);
          }
        } else if (s.type === 'body') {
          window._tl.from(textEl, { x: -60, duration: animIn, ease: 'power2.out' }, sceneStart);
          window._tl.from(card.querySelector('.scene-bar'), { scaleX: 0, transformOrigin: 'left', duration: 0.4 }, sceneStart);
        } else {
          window._tl.from(textEl, { y: 50, duration: animIn, ease: 'power2.out' }, sceneStart);
        }

        // Typing animation
        var staggerTime = Math.min(0.04, (sceneDuration * 0.7) / (spans.length || 1));
        window._tl.to(spans, {
          opacity: 1,
          duration: 0.05,
          stagger: staggerTime,
          ease: 'none'
        }, sceneStart + 0.2);

        // Animate OUT (only if not last scene)
        if (i < n - 1) {
          var outStart = sceneStart + holdEnd;
          window._tl.to(card, { opacity: 0, y: -30, duration: animOut, ease: 'power2.in' }, outStart);
        }

        // Background Cross-fade logic (on main timeline)
        if (i > 0) {
          var nextUrl = s.imageUrl || defaultBg;
          var targetLayerId = currentBgIndex === 1 ? 'bg-2' : 'bg-1';
          var prevLayerId = currentBgIndex === 1 ? 'bg-1' : 'bg-2';

          (function (lId, url) {
            window._tl.set('#' + lId, { attr: { src: url } }, sceneStart);
          })(targetLayerId, nextUrl);

          window._tl.to('#' + targetLayerId, { opacity: {{ BG_BRIGHTNESS }}, duration: 1.0, ease: 'none'
      }, sceneStart);
      window._tl.to('#' + prevLayerId, { opacity: 0, duration: 1.0, ease: 'none' }, sceneStart);

      currentBgIndex = (currentBgIndex === 1 ? 2 : 1);
    }


      }

    // Hold last scene to end
    window._tl.add(function () { }, TOTAL_DURATION);

    } catch (e) {
      console.error('Scene Animation Init Error:', e);
    }
  </script>
</body>

</html>
