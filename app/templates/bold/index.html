<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-top: {{ LOGO_CSS_TOP }}; --v-logo-left: {{ LOGO_CSS_LEFT }}; --v-logo-transform: {{ LOGO_CSS_TRANSFORM }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-top: {{ TAG_CSS_TOP }}; --v-tag-left: {{ TAG_CSS_LEFT }}; --v-tag-transform: {{ TAG_CSS_TRANSFORM }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-main-top: {{ MAIN_CSS_TOP }}; --v-main-left: {{ MAIN_CSS_LEFT }}; --v-main-transform: {{ MAIN_CSS_TRANSFORM }}; --v-main-align: {{ MAIN_CSS_ALIGN }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-content-gap: {{ CONTENT_GAP }};">

<head>
  <script>
    var TOTAL_DURATION = parseFloat("{{ DURATION }}") || 15;
    var SCENES_DATA = JSON.parse('{{ SCENES_JSON }}');
    var SCENE_DURATIONS = JSON.parse('{{ SCENE_DURATIONS_JSON }}');
    var BG_BRIGHTNESS = parseFloat("{{ BG_BRIGHTNESS }}") || 0.45;
    var DEFAULT_BG = "{{ BG_IMAGE_URL }}";
    var LOGO_TEXT = "{{ LOGO_TEXT }}";
    var DATETIME = "{{ DATETIME }}";
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Bold Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>
    (function() {
      var f = "{{ FONT_FAMILY }}".replace(/['"]/g, '');
      if (f) { var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = 'https://fonts.googleapis.com/css2?family=' + f.replace(/ /g, '+') + ':wght@300;400;500;600;700;900&display=swap'; document.head.appendChild(l); }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    :root {
      --cqmin: min(var(--v-width) * 1px, var(--v-height) * 1px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: calc({{ WIDTH }} * 1px);
      height: calc({{ HEIGHT }} * 1px);
      overflow: hidden;
      background-color: #000;
      font-family: {{ FONT_FAMILY }}, 'Inter', sans-serif;
      will-change: transform, opacity;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #bg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, {{ BG_GRADIENT_START }} 0%, {{ BG_GRADIENT_END }} 100%);
      z-index: 1;
      opacity: var(--v-bg-brightness, 0.4);
    }

    .logo-text {
      position: absolute;
      top: var(--v-logo-top);
      left: var(--v-logo-left);
      transform: var(--v-logo-transform) skewX(-10deg);
      color: var(--v-logo-color);
      font-size: calc(var(--cqmin) * var(--v-logo-size) / 720);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      z-index: 40;
      white-space: nowrap;
      display: {{ SHOW_LOGO }};
    }

    .tag-badge {
      position: absolute;
      top: var(--v-tag-top);
      left: var(--v-tag-left);
      transform: var(--v-tag-transform) skewX(-15deg);
      --shimmer-pos: -100%;
      background-image: linear-gradient(110deg, var(--v-tag-bg) 35%, rgba(255, 255, 255, 0.45) 50%, var(--v-tag-bg) 65%);
      background-size: 250% 100%;
      background-position: var(--shimmer-pos) 0%;
      color: var(--v-tag-color);
      padding: 15px 50px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: calc(var(--cqmin) * var(--v-tag-size) / 720);
      z-index: 40;
      white-space: nowrap;
      display: {{ SHOW_TAG }};
    }

    #main-content {
      position: absolute;
      top: {{ MAIN_CSS_TOP }};
      left: {{ MAIN_CSS_LEFT }};
      transform: {{ MAIN_CSS_TRANSFORM }};
      z-index: 50;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: {{ MAIN_CSS_ALIGN }};
      gap: {{ CONTENT_GAP }}px;
    }

    .scene-box {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: {{ MAIN_CSS_ALIGN }};
      gap: 20px;
      text-align: {{ MAIN_CSS_TEXT_ALIGN }};
    }

    .scene-title {
      font-family: {{ FONT_FAMILY }}, 'Inter', sans-serif;
      font-size: calc(var(--cqmin) * {{ HOOK_SIZE }} / 720);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      color: {{ HOOK_COLOR }};
    }
  </style>
</head>

<body>
  <div id="root" data-composition-id="root" data-start="0" data-duration="{{ DURATION }}" data-width="{{ WIDTH }}" data-height="{{ HEIGHT }}" style="--v-bg-brightness: {{ BG_BRIGHTNESS }};">
    <img id="bg-image" class="bg-layer" src="{{ BG_IMAGE_URL }}" alt="" onerror="this.style.display='none'">
    <div id="bg-overlay"></div>

    <div class="logo-text">{{ LOGO_TEXT }}</div>
    <div class="tag-badge">{{ TAG_TEXT }}</div>
    <div class="date-info" style="position: absolute; bottom: 40px; right: 40px; font-weight: 900; font-size: 24px; color: #ffffff; display: {{ SHOW_DATETIME }}; opacity: 0.6;">{{ DATETIME }}</div>

    <div id="main-content"></div>
  </div>

  <script>
    var scenes = SCENES_DATA;
    var sceneDurations = SCENE_DURATIONS;
    
    var mainTl = gsap.timeline({ id: "root", paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = mainTl;

    var currentTime = 0;
    var CROSSFADE = 0.6; // Match transition duration exactly

    function buildKineticSlam(containerEl, text) {
      containerEl.innerHTML = '';
      if (!text) return [];
      var words = text.split(/(\s+)/);
      var wordEls = [];
      for (var w = 0; w < words.length; w++) {
        var word = words[w];
        if (word.trim() === '') {
          var space = document.createTextNode(word);
          containerEl.appendChild(space);
          continue;
        }
        
        var wordSpan = document.createElement('span');
        wordSpan.className = 'kinetic-word';
        wordSpan.style.display = 'inline-block';
        wordSpan.style.position = 'relative';
        wordSpan.style.opacity = 0;
        wordSpan.textContent = word;
        
        containerEl.appendChild(wordSpan);
        wordEls.push(wordSpan);
      }
      return wordEls;
    }

    for (var i = 0; i < scenes.length; i++) {
      var scene = scenes[i];
      var duration = sceneDurations[i] || 5;
      var sceneId = 'scene-' + i;
      
      var sceneEl = document.createElement('div');
      sceneEl.id = sceneId;
      sceneEl.className = 'scene-box type-' + scene.type;
      
      sceneEl.setAttribute('data-start', currentTime.toFixed(3));
      sceneEl.setAttribute('data-duration', duration.toFixed(3));
      sceneEl.setAttribute('data-track-index', "1");
      
      sceneEl.style.zIndex = 100 + i;
      
      var skew = scene.type === 'hook' ? 'skewX(-5deg)' : 'none';
      var fontSizeKey = (scene.type === 'hook' ? '{{ HOOK_SIZE }}' : '{{ BODY_SIZE }}');
      var fontColorKey = (scene.type === 'hook' ? '{{ HOOK_COLOR }}' : '{{ BODY_COLOR }}');
      
      var titleContainer = document.createElement('div');
      titleContainer.className = 'scene-title';
      titleContainer.style.fontSize = 'calc(var(--cqmin) * ' + fontSizeKey + ' / 720)';
      titleContainer.style.color = fontColorKey;
      titleContainer.style.transform = skew;
      
      sceneEl.appendChild(titleContainer);
      document.getElementById('main-content').appendChild(sceneEl);
      
      var wordEls = buildKineticSlam(titleContainer, (scene.text || scene.bodyText || ''));

      var inDur = 0.6;
      var outDur = CROSSFADE;
      var tl = gsap.timeline();
      
      // Entrance
      tl.from(sceneEl, { x: -80, skewX: 8, duration: inDur, ease: "expo.out", force3D: true }, 0);
      tl.from(sceneEl, { opacity: 0, duration: inDur, ease: "none", force3D: true }, 0);
      
      // Word slamming entry
      var staggerTime = Math.min(0.08, (duration * 0.5) / (wordEls.length || 1));
      for (var w = 0; w < wordEls.length; w++) {
        var wordSpan = wordEls[w];
        var startOffset = 0.15 + w * staggerTime;
        var mode = w % 4;
        
        if (mode === 0) { // Fall from top with spring
          tl.fromTo(wordSpan, 
            { opacity: 0, y: -100, scale: 1.3 },
            { opacity: 1, y: 0, scale: 1, duration: 0.35, ease: "back.out(1.8)", force3D: true },
            startOffset
          );
        } else if (mode === 1) { // Zoom from center
          tl.fromTo(wordSpan, 
            { opacity: 0, scale: 0.3 },
            { opacity: 1, scale: 1, duration: 0.3, ease: "back.out(2.2)", force3D: true },
            startOffset
          );
        } else if (mode === 2) { // Slide from left
          tl.fromTo(wordSpan, 
            { opacity: 0, x: -80 },
            { opacity: 1, x: 0, duration: 0.3, ease: "power3.out", force3D: true },
            startOffset
          );
        } else { // Slide from right
          tl.fromTo(wordSpan, 
            { opacity: 0, x: 80 },
            { opacity: 1, x: 0, duration: 0.3, ease: "power3.out", force3D: true },
            startOffset
          );
        }
      }
      
      // Exit: ONLY fade the text content, NOT the whole sceneEl.
      // Keeps the shared background visible during crossfade, preventing black flash.
      if (i < scenes.length - 1) {
        tl.to(titleContainer, { 
          opacity: 0, 
          x: 80, 
          skewX: -8, 
          duration: outDur, 
          ease: "expo.in", 
          force3D: true 
        }, duration - outDur);
      }
      
      mainTl.add(tl, currentTime);
      
      // Cleanup: Hide scene after crossfade
      if (i < scenes.length - 1) {
        mainTl.add(gsap.set(sceneEl, { visibility: 'hidden' }), currentTime + duration);
        currentTime += duration - CROSSFADE;
      } else {
        currentTime += duration;
      }
    }

    var finalDur = parseFloat("{{ DURATION }}") || mainTl.duration() || 15;
    window.duration = finalDur;

    // Recurring shimmer sweep on badge
    var repeatCount = Math.ceil(finalDur / 3.0) - 1;
    mainTl.add(gsap.fromTo(".tag-badge", 
      { "--shimmer-pos": "-100%" }, 
      { "--shimmer-pos": "200%", duration: 1.5, ease: "power2.inOut", repeat: repeatCount, repeatDelay: 1.5 }
    ), 0);

    mainTl.time(0);
    console.log("[Template] Init complete. Duration: " + finalDur + "s");
  </script>
</body>
</html>
