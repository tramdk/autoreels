<!DOCTYPE html>
<html lang="vi"
  style="--v-width: {{ WIDTH }}; --v-height: {{ HEIGHT }}; --v-logo-size: {{ LOGO_SIZE }}; --v-logo-color: {{ LOGO_COLOR }}; --v-logo-top: {{ LOGO_CSS_TOP }}; --v-logo-left: {{ LOGO_CSS_LEFT }}; --v-logo-transform: {{ LOGO_CSS_TRANSFORM }}; --v-logo-show: {{ SHOW_LOGO }}; --v-tag-size: {{ TAG_SIZE }}; --v-tag-color: {{ TAG_COLOR }}; --v-tag-bg: {{ TAG_BG }}; --v-tag-show: {{ SHOW_TAG }}; --v-body-size: {{ BODY_SIZE }}; --v-body-color: {{ BODY_COLOR }}; --v-hook-size: {{ HOOK_SIZE }}; --v-hook-color: {{ HOOK_COLOR }}; --v-main-top: {{ MAIN_CSS_TOP }}; --v-main-left: {{ MAIN_CSS_LEFT }}; --v-main-transform: {{ MAIN_CSS_TRANSFORM }}; --v-main-align: {{ MAIN_CSS_ALIGN }}; --v-divider-color: {{ DIVIDER_COLOR }}; --v-content-gap: {{ CONTENT_GAP }}; --v-bg-start: {{ BG_GRADIENT_START }}; --v-bg-end: {{ BG_GRADIENT_END }}; --v-bg-brightness: {{ BG_BRIGHTNESS }};">

<head>
  <script>
    var TOTAL_DURATION = {{ DURATION }};
    var SCENES_DATA = {{ SCENES_JSON }};
    var SCENE_DURATIONS = {{ SCENE_DURATIONS_JSON }};
    var BG_BRIGHTNESS = {{ BG_BRIGHTNESS }};
    var DEFAULT_BG = {{ BG_IMAGE_URL_JS }};
    var LOGO_TEXT = {{ LOGO_TEXT_JS }};
    var DATETIME = {{ DATETIME_JS }};
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={{ WIDTH }}, user-scalable=no">
  <title>Premium Glassmorphism Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
  <script src="/assets/js/gsap.min.js"></script>
  <style>
    :root {
      --cqmin: min(var(--v-width) * 1px, var(--v-height) * 1px);
      --glass-bg: rgba(255, 255, 255, 0.015);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-edge: rgba(255, 255, 255, 0.15);
      --glass-shine: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.1) 100%);
      --accent-color: {{ DIVIDER_COLOR }};
      --blur-amount: 30px;
    }

    body.is-rendering {
      --blur-amount: 8px; /* Extreme reduction */
    }

    body.is-rendering .grain,
    body.is-rendering .orb {
      display: none !important; /* Disable high-cost background elements */
    }

    body.is-rendering .scene-card {
      background: rgba(255, 255, 255, 0.08); /* Increase opacity to compensate for less blur */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: calc(var(--v-width) * 1px);
      height: calc(var(--v-height) * 1px);
      overflow: hidden;
      background-color: #000;
      font-family: {{ FONT_FAMILY }};
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
      background: #050505;
      color: white;
      overflow: hidden;
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: saturate(1.2);
    }

    #bg-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, var(--v-bg-start) 0%, var(--v-bg-end) 100%);
      z-index: 1;
      opacity: var(--v-bg-brightness, 0.4);
    }

    .grain {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.15;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px); /* Reduced from 60px */
      z-index: 5;
      mix-blend-mode: screen;
      opacity: 0.5;
      pointer-events: none;
      will-change: transform;
    }

    .orb-1 { background: var(--accent-color); width: 600px; height: 600px; top: -15%; left: -15%; }
    .orb-2 { background: {{ LOGO_COLOR }}; width: 500px; height: 500px; bottom: -5%; right: -5%; }
    .orb-3 { background: #6366f1; width: 400px; height: 400px; top: 35%; left: 45%; }

    .logo-badge {
      position: absolute;
      top: var(--v-logo-top);
      left: var(--v-logo-left);
      transform: var(--v-logo-transform);
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 12px 36px;
      border-radius: 100px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      font-size: calc(var(--cqmin) * var(--v-logo-size) / 720);
      backdrop-filter: blur(40px);
      display: var(--v-logo-show);
      align-items: center;
      gap: 16px;
      z-index: 100;
      white-space: nowrap;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .logo-img {
      height: 1.2em;
      width: auto;
      object-fit: contain;
      display: {{ SHOW_LOGO_IMAGE }};
    }

    .tag-container {
      position: absolute;
      top: var(--v-tag-top);
      left: var(--v-tag-left);
      transform: var(--v-tag-transform);
      display: var(--v-tag-show);
      align-items: center;
      gap: 24px;
      z-index: 100;
      white-space: nowrap;
    }

    .tag-badge {
      background: var(--v-tag-bg);
      color: var(--v-tag-color);
      padding: 12px 40px;
      border-radius: 100px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: calc(var(--cqmin) * var(--v-tag-size) / 720);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .datetime-text {
      color: rgba(255, 255, 255, 0.4);
      font-size: calc(var(--cqmin) * 20 / 720);
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    #main-content {
      position: absolute;
      top: var(--v-main-top);
      left: var(--v-main-left);
      transform: var(--v-main-transform);
      z-index: 200;
      width: 88%;
      display: flex;
      flex-direction: column;
      align-items: var(--v-main-align);
      perspective: 2000px;
    }

    .scene-card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 90px 70px;
      border-radius: 72px;
      backdrop-filter: blur(var(--blur-amount)) saturate(220%) contrast(110%);
      -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(220%) contrast(110%);
      will-change: transform, opacity, backdrop-filter;
      text-align: center;
      box-shadow: 
        0 60px 150px rgba(0, 0, 0, 0.7),
        inset 0 0 0 1px var(--glass-edge),
        inset 0 0 100px rgba(255, 255, 255, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
    }

    .scene-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--glass-shine);
      pointer-events: none;
    }

    .scene-text {
      position: relative;
      z-index: 1;
      font-size: calc(var(--cqmin) * var(--v-body-size) / 720);
      font-weight: 500;
      line-height: {{ LINE_HEIGHT }};
      text-transform: uppercase;
      color: var(--v-body-color);
      letter-spacing: -0.02em;
    }

    .type-hook .scene-text {
      color: var(--v-hook-color);
      font-size: calc(var(--cqmin) * var(--v-hook-size) / 720);
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    .divider-line {
      width: 80px;
      height: 4px;
      background: var(--v-divider-color);
      margin-top: 40px;
      border-radius: 100px;
      opacity: 0.8;
      display: inline-block;
    }

    .scene-progress-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      overflow: hidden;
      display: {{ SHOW_PROGRESS_BAR }};
    }

    .scene-progress-bar {
      width: 0%;
      height: 100%;
      background: var(--v-divider-color);
      box-shadow: 0 0 10px var(--v-divider-color);
    }

  </style>
</head>

<body>
  <div id="root" data-composition-id="root" data-duration="{{ DURATION }}" data-width="{{ WIDTH }}" data-height="{{ HEIGHT }}" style="--v-bg-brightness: {{ BG_BRIGHTNESS }};">
    <img id="bg-image" class="bg-layer" src="{{ BG_IMAGE_URL }}" alt="" onerror="this.style.display='none'">
    <div id="bg-overlay"></div>
    <div class="grain"></div>

    <!-- Animated Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="logo-badge" style="display: flex;">
      <img class="logo-img" src="{{ LOGO_IMAGE }}" alt="">
      <div style="width: 12px; height: 12px; border-radius: 50%; background: {{ DIVIDER_COLOR }}; box-shadow: 0 0 10px {{ DIVIDER_COLOR }}; display: {{ SHOW_LOGO_IMAGE === 'none' ? 'block' : 'none' }};"></div>
      {{ LOGO_TEXT }}
    </div>

    <div class="tag-container">
      <div class="tag-badge">{{ TAG_TEXT }}</div>
      <div class="datetime-text">{{ DATETIME }}</div>
    </div>

    <div id="main-content"></div>
  </div>

  <script>
    var scenes = SCENES_DATA;
    var sceneDurations = SCENE_DURATIONS;
    
    // Detect rendering mode early to avoid ReferenceError
    var isRendering = window.__hf && (window.__hf.active || window.__hf.duration);

    var mainTl = gsap.timeline({ id: "root", paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = mainTl;
    window._tl = mainTl; // Critical for HyperFrames seeking

    var currentTime = 0;
    var CROSSFADE = 0.5; // 0.5s overlap between scenes for smooth crossfade

    for (var i = 0; i < scenes.length; i++) {
      var scene = scenes[i];
      var duration = sceneDurations[i] || 5;
      var sceneId = 'scene-' + i;
      
      var sceneEl = document.createElement('div');
      sceneEl.id = sceneId;
      sceneEl.className = 'scene-card type-' + (scene.type || 'body');
      
      sceneEl.setAttribute('data-start', currentTime.toFixed(3));
      sceneEl.setAttribute('data-duration', duration.toFixed(3));
      sceneEl.setAttribute('data-track-index', "1");
      
      sceneEl.innerHTML = '<div class="scene-text">' + (scene.text || scene.bodyText || '') + '</div>' + 
                          '<div class="divider-line"></div>' +
                          '<div class="scene-progress-container"><div class="scene-progress-bar"></div></div>';
      document.getElementById('main-content').appendChild(sceneEl);

      var inDur = 0.8;  // Faster entrance for snappier feel
      var outDur = 0.6;  // Slightly faster exit

      var progBar = sceneEl.querySelector('.scene-progress-bar');
      var tl = gsap.timeline();
      
      if (progBar) {
        tl.to(progBar, { width: "100%", duration: duration, ease: "none" }, 0);
      }

      // Scene entrance — starts at t=0 of this scene's timeline
      tl.from(sceneEl, { 
        opacity: 0, 
        y: 80,
        scale: 0.9, 
        rotationX: isRendering ? 0 : 15,
        rotationY: isRendering ? 0 : -5,
        z: isRendering ? 0 : -100,
        duration: inDur, 
        ease: "power3.out" 
      }, 0);

      // Gentle floating during hold
      var floatDur = Math.max(0.1, duration - inDur - outDur);
      tl.to(sceneEl, {
        rotationX: isRendering ? 0 : -3,
        rotationY: isRendering ? 0 : 3,
        y: "-=15",
        duration: floatDur,
        ease: "sine.inOut"
      }, inDur);

      // Scene exit
      if (i < scenes.length - 1) {
        tl.to(sceneEl, { 
          opacity: 0, 
          scale: 1.03, 
          y: -30,
          duration: outDur, 
          ease: "power2.in" 
        }, duration - outDur);
      } else {
        // Last scene — gentle fade out
        tl.to(sceneEl, { 
          opacity: 0, 
          scale: 1.03, 
          duration: outDur 
        }, Math.max(inDur, duration - outDur));
      }
      
      mainTl.add(tl, currentTime);
      
      // Advance timeline: subtract CROSSFADE to create overlap with next scene
      // (next scene starts 0.5s before this scene fully exits)
      if (i < scenes.length - 1) {
        currentTime += duration - CROSSFADE;
      } else {
        currentTime += duration;
      }
    }

    var finalDur = parseFloat("{{ DURATION }}") || mainTl.duration() || 15;
    window.duration = finalDur;

    // Premium floating orbs animation
    var orbRepeat = -1; 
    gsap.to(".orb", {
      x: "random(-100, 100)",
      y: "random(-100, 100)",
      duration: "random(8, 12)",
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });

    mainTl.time(0);
    if (isRendering) {
      document.body.classList.add('is-rendering');
    } else {
      setTimeout(function() { mainTl.play(); }, 500);
    }
    console.log("[Template] Premium Glassmorphism Init complete.");
  </script>
</body>
</html>
